name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref, tag, or SHA to publish
        required: true
        default: v0.2.0

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org

      - name: Verify npm token
        run: npm whoami

      - name: Read package metadata
        id: package
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const pkg = require('./package.json');
          console.log(`name=${pkg.name}`);
          console.log(`version=${pkg.version}`);
          NODE

      - name: Check if version is already published
        id: published
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install
        if: steps.published.outputs.exists != 'true'
        run: npm ci

      - name: Test
        if: steps.published.outputs.exists != 'true'
        run: npm test

      - name: Publish
        if: steps.published.outputs.exists != 'true'
        run: npm publish --access public

      - name: Already published
        if: steps.published.outputs.exists == 'true'
        run: echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published"
